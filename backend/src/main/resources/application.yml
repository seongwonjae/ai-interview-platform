server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-exception: true
    include-stacktrace: on_param

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/interview_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: app
    password: app
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_CHANGE_ME"
    expirationMinutes: 120

logging:
  level:
    #org.hibernate.SQL: debug
    org.springframework.security: DEBUG

openai:
  apiKey: ${OPENAI_API_KEY}
  model: gpt-4o-mini
